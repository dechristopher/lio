# docker-compose deployment for lioctad.org — replaces Fly.io (src/fly.toml).
#
# Ingress is a Cloudflare Access tunnel, so no load balancer / TLS termination
# here: the app port is published on loopback only and cloudflared (running on
# the host) points its origin at http://localhost:4444. If you instead run
# cloudflared as a container on this compose network, drop the `ports` mapping
# and set the tunnel origin to http://lioctad:4444.
#
# Deploy/update the stack with deploy/deploy-compose.sh (resolves GIT_REV,
# builds, and rolls the service). Manual equivalent:
#   GIT_REV=$(git rev-parse --short HEAD) docker compose -f deploy/docker-compose.yaml up -d --build
#
# Secrets are plain files under deploy/secrets/ (gitignored), mounted by
# compose at /run/secrets/<name> — exactly where config.ReadSecret looks in
# prod. Required for the app: crypto_key for the session/identity crypto, the
# four lio_obj_* values for the MinIO/S3 PGN archive, lio_redis_addr (redis:6379
# on this compose network) for room restart persistence, and lio_pg_dsn
# (postgres:5432) for the durable relational game archive. postgres_password is
# consumed by the postgres container itself and must match the password embedded
# in lio_pg_dsn. The app exits at boot in prod if the object store, redis, or
# postgres is unreachable or misconfigured.

name: lioctad

services:
  lioctad:
    build:
      # relative to this file (deploy/), so ../src is the Go module root
      context: ../src
      args:
        # injected into config.Revision via ldflags; empty = no +hash suffix
        GIT_REV: ${GIT_REV:-}
    image: lioctad:latest
    restart: unless-stopped
    # Scoped debug logging. The image ENTRYPOINT is bare /lio (no baked-in flags),
    # so this deploy-side override is where prod log verbosity is chosen. Trim or
    # drop it to quiet the logs further.
    command: ["--debug", "room,dispatch,clock"]
    # SIGINT triggers graceful shutdown; the grace period leaves headroom for
    # the drain (final room-snapshot flush + client notify — see
    # arch/STATE_PERSISTENCE_SCALING.md) which itself targets well under 2s
    stop_signal: SIGINT
    stop_grace_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DEPLOY: "prod"
      PORT: "4444"
      # Host of the self-hosted Plausible analytics instance. Deliberately not
      # a literal here (this file is in VCS): compose substitutes it from the
      # deploy host's environment or the gitignored deploy/.env
      # (PLAUSIBLE_DOMAIN=stats.example.com). Empty disables analytics — the
      # tracker <script> isn't rendered and the CSP stays same-origin only.
      PLAUSIBLE_DOMAIN: ${PLAUSIBLE_DOMAIN:-}
    ports:
      # loopback only — the Cloudflare tunnel is the sole public ingress
      - "127.0.0.1:4444:4444"
    # Secrets are mounted at /run/secrets/<name>. The container runs unprivileged
    # (uid 10001, see src/Dockerfile), so each secret must be readable by that
    # user or the app boots with a blank crypto key ("invalid key size 0").
    # NOTE: `docker compose` (non-swarm) does NOT apply uid/gid/mode to file
    # secrets — it bind-mounts them with their host permissions — so the deploy
    # script (deploy/deploy-compose.sh) also makes the host files readable. These
    # fields document intent and are honored under `docker stack deploy`.
    secrets:
      - source: crypto_key
        uid: "10001"
        gid: "10001"
        mode: 0440
      - source: lio_obj_endpoint
        uid: "10001"
        gid: "10001"
        mode: 0440
      - source: lio_obj_bucket_pgn
        uid: "10001"
        gid: "10001"
        mode: 0440
      - source: lio_obj_access
        uid: "10001"
        gid: "10001"
        mode: 0440
      - source: lio_obj_secret
        uid: "10001"
        gid: "10001"
        mode: 0440
      - source: lio_redis_addr
        uid: "10001"
        gid: "10001"
        mode: 0440
      - source: lio_pg_dsn
        uid: "10001"
        gid: "10001"
        mode: 0440
    healthcheck:
      # The runtime image is scratch (no shell/wget), so probe via the binary's
      # own health check (`/lio --health` → GET /lio on the loopback-only
      # internal health listener, 127.0.0.1:4445 — purely in-container, never
      # published; see cmd/lio/main.go and src/www/health.go).
      # Tuned to report healthy quickly (the app boots in ms) so the deploy's
      # health wait can be short — a slow start means a bad build, not a slow one.
      test: ["CMD", "/lio", "--health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Room restart persistence (arch/STATE_PERSISTENCE_SCALING.md): live-room
  # snapshots with AOF-everysec durability. Off the host network; the app
  # reaches it at redis:6379 (the lio_redis_addr secret) on the compose network.
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3

  # Durable relational game archive:
  # finished games + deduped move/position analytics. System of record for
  # finished games only — never live game state (that is redis). Off the host
  # network; the app reaches it at postgres:5432 via the lio_pg_dsn secret. The
  # data dir is a persistent named volume; migrations run in-process at app boot.
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lio
      POSTGRES_USER: lio
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lio -d lio"]
      interval: 15s
      timeout: 3s
      retries: 3

secrets:
  crypto_key:
    file: ./secrets/crypto_key
  lio_obj_endpoint:
    file: ./secrets/lio_obj_endpoint
  lio_obj_bucket_pgn:
    file: ./secrets/lio_obj_bucket_pgn
  lio_obj_access:
    file: ./secrets/lio_obj_access
  lio_obj_secret:
    file: ./secrets/lio_obj_secret
  lio_redis_addr:
    file: ./secrets/lio_redis_addr
  # full connection URL for the app, e.g.
  # postgres://lio:<password>@postgres:5432/lio?sslmode=disable
  lio_pg_dsn:
    file: ./secrets/lio_pg_dsn
  # consumed by the postgres container init; must match the password in lio_pg_dsn
  postgres_password:
    file: ./secrets/postgres_password

volumes:
  redis-data:
  postgres-data:
